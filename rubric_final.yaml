# Rúbrica — Anexo VI. Valorador de Informes Finales de Proyectos de Investigación (UCCuyo)
# Escala por ítem: 0–4 (0=No evidenciado · 1=Bajo · 2=Medio · 3=Alto · 4=Muy alto)
# Pesos y umbrales según documento institucional.

weights:
  identificacion_general: 5
  cronograma: 5
  objetivos: 15
  metodologia: 10
  resultados: 20
  formacion_rrhh: 10
  gestion: 5
  dificultades: 5
  transferencia: 10
  calidad_formal: 10
  impacto: 5

thresholds:
  aprobado: 60
  aprobado_obs: 50

# Nombres oficiales (Anexo VI) para UI y exportación
labels:
  identificacion_general: "Identificación general del proyecto"
  cronograma: "Cumplimiento del cronograma"
  objetivos: "Grado de cumplimiento de los objetivos"
  metodologia: "Metodología"
  resultados: "Resultados finales"
  formacion_rrhh: "Formación de recursos humanos"
  gestion: "Gestión del proyecto"
  dificultades: "Dificultades y estrategias"
  transferencia: "Difusión y transferencia"
  calidad_formal: "Calidad formal del informe"
  impacto: "Impacto y proyección"

